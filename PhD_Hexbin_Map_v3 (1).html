const feats = DATA.features, N = feats.length;
const maxPhd = Math.max(...feats.map(f=>f.properties.phd));

const baseH=new Float64Array(N), curH=new Float64Array(N), vel=new Float64Array(N);
const cxA=new Float64Array(N), cyA=new Float64Array(N);
feats.forEach((f,i)=>{
  const p=f.properties, co=f.geometry.coordinates[0];
  p.baseH = Math.sqrt(p.phd/maxPhd)*135000;
  baseH[i]=p.baseH; curH[i]=p.baseH;
  let sx=0,sy=0,n=co.length-1;
  for(let j=0;j<n;j++){sx+=co[j][0];sy+=co[j][1];}
  cxA[i]=sx/n; cyA[i]=sy/n;
});

const map = new maplibregl.Map({
  container:'map',
  style:{version:8,
    sources:{carto:{type:'raster',
      tiles:['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],tileSize:256,
      attribution:'&copy; CartoDB &copy; OpenStreetMap'}},
    layers:[
      {id:'bg',type:'background',paint:{'background-color':'#0a0a0e'}},
      {id:'carto',type:'raster',source:'carto',
       paint:{'raster-opacity':0.75,'raster-brightness-max':0.65}}
    ]},
  center:[-97,39], zoom:4.2, pitch:52, bearing:-12, antialias:true, maxPitch:70
});
map.addControl(new maplibregl.NavigationControl(),'top-right');

map.on('load',()=>{
  map.addSource('hexes',{type:'geojson',data:DATA});
  map.addLayer({id:'hex-ext',type:'fill-extrusion',source:'hexes',paint:{
    'fill-extrusion-color':['interpolate',['linear'],['get','phd'],
      0,'#003f5c', 500,'#2f4b7c', 2000,'#665191', 5000,'#a05195',
      15000,'#d45087', 35000,'#f95d6a', 55000,'#ff7c43', 80000,'#ffa600'],
    'fill-extrusion-height':['coalesce',['feature-state','h'],['get','baseH']],
    'fill-extrusion-base':0,
    'fill-extrusion-opacity':0.6
  }});

  const K=0.32, D=0.58, RAD=160, BOOST=3.5;
  let mx=-9999,my=-9999;
  const cv=map.getCanvas();
  cv.addEventListener('mousemove',e=>{mx=e.offsetX;my=e.offsetY});
  cv.addEventListener('mouseleave',()=>{mx=-9999;my=-9999});

  function tick(){
    for(let i=0;i<N;i++){
      const pt=map.project([cxA[i],cyA[i]]);
      const dx=mx-pt.x,dy=my-pt.y,dist=Math.sqrt(dx*dx+dy*dy);
      let tgt=baseH[i];
      if(dist<RAD){const p=1-dist/RAD; tgt+=Math.max(24000,baseH[i]*BOOST)*p*p;}
      vel[i]=(vel[i]+K*(tgt-curH[i]))*D;
      curH[i]+=vel[i];
      if(Math.abs(vel[i])>1||Math.abs(curH[i]-tgt)>1)
        map.setFeatureState({source:'hexes',id:i},{h:curH[i]});
    }
    requestAnimationFrame(tick);
  }
  tick();

  const tt=document.getElementById('tt');
  map.on('mousemove','hex-ext',e=>{
    if(e.features&&e.features.length){
      const p=e.features[0].properties;
      tt.innerHTML='<b>'+Number(p.phd).toLocaleString()+' PhDs</b><br>'+
        p.cnt+' census tracts<br>Density: '+p.density+'/tract';
      tt.style.display='block';
      tt.style.left=(e.point.x+16)+'px';
      tt.style.top=(e.point.y-40)+'px';
    }
  });
  map.on('mouseleave','hex-ext',()=>{tt.style.display='none'});
});
